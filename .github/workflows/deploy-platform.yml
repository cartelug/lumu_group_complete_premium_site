name: Deploy site to GitHub Pages

on:
  # Pages Source is "GitHub Actions", so this workflow IS the deploy.
  # Publishes the framework-free static site in /static-site on every push to main.
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: static-site
      - id: deployment
        uses: actions/deploy-pages@v4
